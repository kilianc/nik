# api keys
openai_key: sk-proj-...       # OpenAI API key for GPT models
anthropic_key: sk-ant-...     # Anthropic API key for Claude models

# models
models:
  main:
    model: gpt-5.4
    reasoning_effort: ""      # none, minimal, low, medium, high, xhigh (empty = model default)
    verbosity: ""             # low, medium, high (empty = model default)
    backend: subscription     # api | subscription (subscription = ChatGPT Plus/Pro OAuth)
  task:
    model: ""                 # model for task workers (empty = use main model)
    reasoning_effort: ""
    verbosity: ""
    backend: api              # api | subscription
  recall:
    model: ""                 # model for recall pre-filtering (empty = skip recall)
    reasoning_effort: ""      # none, minimal, low, medium, high, xhigh (empty = model default)
    verbosity: ""             # low, medium, high (empty = model default)
  critic:
    enabled: false            # enable post-task critic assessment
    model: ""                 # required when critic is enabled
    reasoning_effort: ""      # none, minimal, low, medium, high, xhigh (empty = model default)
    verbosity: ""             # low, medium, high (empty = model default)
    backend: api              # api | subscription
  tts:
    model: gpt-4o-mini-tts    # TTS model
    voice: ash                # alloy, ash, ballad, coral, echo, fable, onyx, nova, sage, shimmer
    speed: 1.0                # 0.25 – 4.0

# task runner limits
task:
  max_rounds: 200             # max LLM rounds per task (default 200)
  timeout: 60m                # max wall-clock time per task (default 60m)

# paths (relative to home dir)
prompts_dir: ../prompts
skills_dir: ../skills

# conversations (label: uuid)
privileged_conversation_ids:  # conversations with owner-level access — always allowed
  dms: ...
allow_conversation_ids:       # other conversations nik can respond to
  family: ...

# context
max_history: 100              # max messages loaded per conversation
system_message_max_age: 2h    # max age for system messages in timeline (default 2h)
timezone: America/New_York
location: New York, NY

# shell sandbox
shell:
  docker_image: nik-shell     # empty = run commands on host via tmux

# content filters
banned_words: []              # words nik must never use
