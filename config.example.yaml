# LLM
openai_key: sk-proj-...  # optional when use_codex is true
use_codex: false         # use ChatGPT subscription (OAuth) instead of API key
model: gpt-5.4
reasoning_effort: ""     # none, minimal, low, medium, high, xhigh (empty = model default)
verbosity: ""            # low, medium, high (empty = model default)
recall_model: ""         # model for recall pre-filtering (empty = skip recall)

# search
exa_api_key: ""          # Exa web search API key

# paths (relative to home dir)
media_dir: media
prompts_dir: ../prompts
skills_dir: ../skills

# conversations
privileged_conversation_ids: # conversations with owner-level access — always allowed
  - ...
allow_conversation_ids:      # other conversations nik can respond to
  - ...

# context
max_history: 100             # max messages loaded per conversation
timezone: America/New_York
location: New York, NY

# scheduled routines (HH:MM in configured timezone, empty = disabled)
journal_time: "00:00"        # nightly journal
dream_time: "02:00"          # nightly dream cycle
briefing_time: "08:00"       # morning briefing
diagnostic_time: "08:00"     # daily system diagnostic

# content filters
banned_words: []             # words nik must never use
